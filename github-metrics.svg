<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320" role="img" aria-label="Metrics dashboard loading">
  <defs>
    <style>
      .label { font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="#0A0A0A"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="900" height="44" fill="#0A66C2"/>
  <text x="20" y="29" class="label" font-size="14" font-weight="700" fill="#FFFFFF">⬡ Danyal Ahmad · GitHub Metrics</text>
  <circle cx="870" cy="22" r="5" fill="#E8FA03">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="836" y="27" class="label" font-size="11" fill="#FFFFFF">LIVE</text>

  <!-- Subheader -->
  <text x="20" y="68" class="label" font-size="11" fill="#A9A9A9">Metrics dashboard · auto-generated by the "Metrics" GitHub Action</text>

  <!-- Row 1: Avatar placeholder + name -->
  <rect x="20" y="84" width="56" height="56" rx="6" fill="#1A1A1A" stroke="#0A66C2" stroke-width="1"/>
  <text x="48" y="118" class="label" font-size="20" font-weight="700" fill="#0A66C2" text-anchor="middle">DA</text>

  <text x="92" y="102" class="label" font-size="14" font-weight="700" fill="#FFFFFF">Danyal Ahmaad</text>
  <text x="92" y="120" class="label" font-size="11" fill="#A9A9A9">AI · ML Engineer · Lahore, Pakistan</text>
  <text x="92" y="136" class="label" font-size="11" fill="#E8FA03">★ Followers: loading... · Following: loading... · Created: 2020</text>

  <!-- Row 2: Stats grid -->
  <text x="20" y="172" class="label" font-size="11" font-weight="700" fill="#0A66C2">OVERVIEW</text>

  <rect x="20" y="180" width="200" height="44" fill="#1A1A1A" stroke="#0A66C2" stroke-width="0.5"/>
  <text x="30" y="200" class="label" font-size="10" fill="#A9A9A9">Repositories</text>
  <text x="30" y="216" class="label" font-size="16" font-weight="700" fill="#E8FA03">···</text>

  <rect x="232" y="180" width="200" height="44" fill="#1A1A1A" stroke="#0A66C2" stroke-width="0.5"/>
  <text x="242" y="200" class="label" font-size="10" fill="#A9A9A9">Stars earned</text>
  <text x="242" y="216" class="label" font-size="16" font-weight="700" fill="#E8FA03">···</text>

  <rect x="444" y="180" width="200" height="44" fill="#1A1A1A" stroke="#0A66C2" stroke-width="0.5"/>
  <text x="454" y="200" class="label" font-size="10" fill="#A9A9A9">Commits (year)</text>
  <text x="454" y="216" class="label" font-size="16" font-weight="700" fill="#E8FA03">···</text>

  <rect x="656" y="180" width="224" height="44" fill="#1A1A1A" stroke="#0A66C2" stroke-width="0.5"/>
  <text x="666" y="200" class="label" font-size="10" fill="#A9A9A9">Pull requests</text>
  <text x="666" y="216" class="label" font-size="16" font-weight="700" fill="#E8FA03">···</text>

  <!-- Row 3: Languages header -->
  <text x="20" y="252" class="label" font-size="11" font-weight="700" fill="#0A66C2">LANGUAGES</text>

  <!-- Language bars (placeholder) -->
  <rect x="20" y="260" width="860" height="10" fill="#1A1A1A"/>
  <rect x="20" y="260" width="280" height="10" fill="#0A66C2">
    <animate attributeName="width" values="0;280;280" dur="2s" fill="freeze"/>
  </rect>
  <rect x="300" y="260" width="180" height="10" fill="#E8FA03">
    <animate attributeName="width" values="0;180;180" dur="2s" begin="0.3s" fill="freeze"/>
  </rect>
  <rect x="480" y="260" width="120" height="10" fill="#FFFFFF" opacity="0.6">
    <animate attributeName="width" values="0;120;120" dur="2s" begin="0.6s" fill="freeze"/>
  </rect>

  <text x="20" y="290" class="label" font-size="10" fill="#A9A9A9">Loading language breakdown… run the "Metrics" workflow once to populate this dashboard.</text>

  <text x="20" y="310" class="label" font-size="9" fill="#0A66C2" opacity="0.6">↑ this is a placeholder SVG · replaced automatically after first workflow run</text>
</svg>
