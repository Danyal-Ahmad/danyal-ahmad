  <rect width="480" height="160" rx="12" fill="#0D1117" stroke="#00D9FF" stroke-width="1"/>
  <text x="24" y="40" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" fill="#00D9FF">$ languages --breakdown</text>
