name: Recent Activity

# NOTE: This workflow still runs and updates the
# <!--START_SECTION:activity--> block if present in README.md.
# The current README intentionally does not show that section,
# but the workflow is kept so you can re-enable it any time
# by adding the markers back to README.md.

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Update README with recent activity
    steps:
      - uses: actions/checkout@v4
      - uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          COMMIT_MSG: "chore: update recent activity"
          MAX_LINES: 5
