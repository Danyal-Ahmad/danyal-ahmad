name: Latest Blog Posts

# Auto-pulls articles from RSS feeds and injects them into the
# <!--START_SECTION:blog-posts--> block in README.md.
# Works out of the box with dev.to's featured feed.
# To customize, edit the feed_list below with your own blog / YouTube RSS URLs.
# Tip: YouTube channel RSS = https://www.youtube.com/feeds/videos.xml?channel_id=UCxxxxxxxx

on:
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-posts:
    runs-on: ubuntu-latest
    name: Pull latest articles into README
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and commit blog posts
        uses: gautamkrishnar/blog-post-workflow@master
        with:
          # The comment_tag_name MUST match the markers in README.md
          comment_tag_name: "blog-posts"
          max_post_count: "5"
          # Default feeds — replace with your own blog / YouTube RSS
          feed_list: "https://dev.to/feed/"
          # Preserve custom formatting
          template: "$newline[$title]($url)$newline$newline<sub>$date · $author</sub>$newline"
          # Don't commit if nothing changed
          skip_commit: "false"
          # Disable the "read more" link trimming
          committer_username: "github-actions[bot]"
          committer_email: "41898282+github-actions[bot]@users.noreply.github.com"
