name: Language Breakdown SVG

# Generates a second, language-focused metrics SVG (github-languages.svg)
# with a more detailed breakdown: bytes, percentages, recent activity.
# Different from metrics.yml which produces the general dashboard.
# Pushes the SVG to main, where the README references it.

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate language breakdown SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Danyal-Ahmad
          template: terminal
          base: ""
          config_timezone: Asia/Karachi
          # Languages plugin — detailed breakdown
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage, lines
          plugin_languages_limit: 12
          plugin_languages_sections: most-used, recently-used
          plugin_languages_colors: github
          plugin_languages_threshold: 0%
          # Follow-up: shows recent repo activity per language
          plugin_followup: yes
          plugin_followup_sections: repositories
          # Achievements: compact badges
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: no
          plugin_achievements_display: compact
          plugin_achievements_limit: 5
          output_filename: github-languages.svg

      - name: Commit updated languages SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-languages.svg
          git commit -m "chore: refresh github-languages.svg" || echo "no changes"
          git push
